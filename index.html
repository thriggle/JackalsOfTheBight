<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deneb Wilds - Traveller RPG Setting</title>
  <meta name="description"
    content="A macro-level exploratory interface for the Deneb Wilds Galaxiad era setting in Traveller.">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap"
    rel="stylesheet">
</head>

<body>
  <div id="app" class="app-container">

    <!-- Sidebar Navigation -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1>Deneb Wilds</h1>
        <p class="subtitle">Galaxiad 1900</p>
      </div>

      <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search worlds, factions, tags...">
        <div id="searchResults" class="search-results hidden"></div>
      </div>

      <div class="nav-sections">
        <button class="nav-item active" data-view="map">
          <span class="icon">🌌</span> Living Star Map
        </button>

        <h3 class="nav-heading">Topics</h3>

        <div class="nav-group">
          <button class="nav-item" data-category="History">
            <span class="icon">⏳</span> History
          </button>
          <div class="nav-subitems hidden" id="nav-history"></div>
        </div>

        <div class="nav-group">
          <button class="nav-item" data-category="Sophont">
            <span class="icon">🧬</span> Sophonts
          </button>
          <div class="nav-subitems hidden" id="nav-sophont"></div>
        </div>

        <div class="nav-group">
          <button class="nav-item" data-category="Faction">
            <span class="icon">⚔️</span> Factions & Regions
          </button>
          <div class="nav-subitems hidden" id="nav-faction"></div>
        </div>

        <div class="nav-group">
          <button class="nav-item" data-category="Pentarchy">
            <span class="icon">🤖</span> The Pentarchs
          </button>
          <div class="nav-subitems hidden" id="nav-pentarchy"></div>
        </div>

        <div class="nav-group">
          <button class="nav-item" data-category="Culture">
            <span class="icon">🎭</span> Cultural Phenomena
          </button>
          <div class="nav-subitems hidden" id="nav-culture"></div>
        </div>

        <div class="nav-group">
          <button class="nav-item" data-category="Document">
            <span class="icon">📜</span> Media & Artifacts
          </button>
          <div class="nav-subitems hidden" id="nav-document"></div>
        </div>

        <h3 class="nav-heading" style="margin-top: 1.5rem;">Reference</h3>

        <button class="nav-item" data-view="index" id="nav-index-btn">
          <span class="icon">🗂️</span> Index
        </button>
      </div>
    </nav>

    <!-- Main Content Area -->
    <main class="content-area">
      <!-- View: Map -->
      <div id="view-map" class="view active">
        <!-- The hex map will be rendered into this container by JS/D3 or Canvas -->
        <div id="map-container">
          <canvas id="hexMapCanvas"></canvas>
          <div id="distant-coreward" class="distant-block hidden">
            <h4>Coreward</h4>
            <div id="list-coreward" class="distant-list"></div>
          </div>
          <div id="distant-rimward" class="distant-block hidden">
            <h4>Rimward</h4>
            <div id="list-rimward" class="distant-list"></div>
          </div>
          <div id="distant-spinward" class="distant-block hidden">
            <h4>Spinward</h4>
            <div id="list-spinward" class="distant-list"></div>
          </div>
          <div id="distant-trailing" class="distant-block hidden">
            <h4>Trailing</h4>
            <div id="list-trailing" class="distant-list"></div>
          </div>
          <div id="map-overlay" class="map-overlay hidden">
            <!-- Used to display quick-ref for a world -->
          </div>
        </div>
      </div>

      <!-- View: Detail Pane -->
      <div id="view-detail" class="view hidden">
        <div class="detail-header">
          <button id="backToMapBtn" class="back-btn">← Back to Map</button>

        </div>
        <div id="detail-content" class="detail-content">
          <!-- Populated dynamically via JS -->
        </div>
      </div>
    </main>

    <!-- Microfilm Reader Modal -->
    <div id="microfilm-modal" class="microfilm-modal hidden">
      <div class="microfilm-backdrop" onclick="closeMicrofilm()"></div>
      <div class="microfilm-content">
        <div class="microfilm-header">
          <h2 id="microfilm-title">Document Title</h2>
          <button id="closeMicrofilmBtn" class="close-btn" onclick="closeMicrofilm()">&times;</button>
        </div>
        <div class="microfilm-body crt-effect" id="microfilm-body">
          <!-- Document content loaded here -->
        </div>
      </div>
    </div>

  </div>

  <!-- Audio Player Modal -->
  <div id="audio-modal" class="microfilm-modal hidden">
    <div class="microfilm-backdrop" onclick="closeAudioArchive()"></div>
    <div class="microfilm-content" style="max-width: 600px;">
      <div class="microfilm-header">
        <h2 id="audio-title">Audio Archive</h2>
        <button id="closeAudioBtn" class="close-btn" onclick="closeAudioArchive()">&times;</button>
      </div>
      <div class="microfilm-body crt-effect"
        style="display: flex; flex-direction: column; align-items: center; background-color: #000; overflow-y: auto;">

        <!-- Sticky Audio Header Container -->
        <div id="audio-sticky-header" class="audio-sticky-header">
          <canvas id="oscilloscope" width="500" height="200"
            style="width: 100%; border-radius: 4px; box-shadow: inset 0 0 10px rgba(0,255,0,0.2); margin-bottom: 2rem; background-color: #051005; border: 1px solid rgba(16, 185, 129, 0.3); flex-shrink: 0; transition: height 0.3s ease;"></canvas>
          <audio id="audio-player" controls
            style="width: 100%; filter: sepia(100%) hue-rotate(90deg) saturate(300%) contrast(150%); flex-shrink: 0;">
            Your browser does not support the audio element.
          </audio>
          <div id="audio-subtext-tabs-container" style="width: 100%; margin-top: 1.5rem; display: none;">
            <div id="audio-subtext-tabs"
              style="display: flex; gap: 0.5rem; border-bottom: 1px solid rgba(16, 185, 129, 0.3); padding-bottom: 0.5rem; overflow-x: auto;">
            </div>
          </div>
        </div>

        <!-- Scrollable Subtext Content -->
        <div id="audio-subtext-container" style="width: 100%; padding: 0 2rem 2rem 2rem; display: none;">
          <div id="audio-subtext-content"
            style="color: var(--text-color); font-size: 0.95rem; line-height: 1.5; white-space: pre-wrap; margin-top: 1rem;">
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Image Viewer Modal -->
  <div id="image-modal" class="microfilm-modal hidden">
    <div class="microfilm-backdrop" onclick="closeImageArchive()"></div>
    <div class="microfilm-content" style="max-width: 600px;">
      <div class="microfilm-header">
        <h2 id="image-title">Image Archive</h2>
        <button id="closeImageBtn" class="close-btn" onclick="closeImageArchive()">&times;</button>
      </div>
      <div class="microfilm-body crt-effect"
        style="display: flex; flex-direction: column; align-items: center; background-color: #000; overflow-y: auto;">

        <!-- Sticky Image Header Container -->
        <div id="image-sticky-header" class="image-sticky-header">
          <img id="image-viewer" src="" alt="Viewed Image"
            style="width: 100%; border-radius: 4px; box-shadow: inset 0 0 10px rgba(0,255,0,0.2); background-color: #051005; border: 1px solid rgba(16, 185, 129, 0.3); flex-shrink: 0; object-fit: contain; transition: max-height 0.3s ease;">
          <div id="image-subtext-tabs-container" style="width: 100%; margin-top: 1.5rem; display: none;">
            <div id="image-subtext-tabs"
              style="display: flex; gap: 0.5rem; border-bottom: 1px solid rgba(16, 185, 129, 0.3); padding-bottom: 0.5rem; overflow-x: auto;">
            </div>
          </div>
        </div>

        <!-- Scrollable Subtext Content -->
        <div id="image-subtext-container" style="width: 100%; padding: 0 2rem 2rem 2rem; display: none;">
          <div id="image-subtext-content"
            style="color: var(--text-color); font-size: 0.95rem; line-height: 1.5; white-space: pre-wrap; margin-top: 1rem;">
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/map.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/disclaimer.js"></script>
</body>

</html>
